appId: com.mikeisbell.trivolta
---
# test_21: Custom category screen — type a topic, submit, navigate back, custom-category-back

- clearState
- launchApp:
    clearState: true

# Sign in
- assertVisible:
    id: "auth-email-input"
- tapOn:
    id: "auth-email-input"
- inputText: "testuser_maestro_02@trivolta-test.com"
- tapOn:
    id: "auth-password-input"
- inputText: "TestPassword123!"
- tapOn:
    id: "auth-submit-button"
- tapOn:
    text: "Not Now"
    optional: true
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

# Tap the Any topic card
- tapOn:
    id: "home-category-custom"
- waitForAnimationToEnd
- assertVisible:
    id: "custom-category-input"

# Type a topic and submit
- tapOn:
    id: "custom-category-input"
- inputText: "Ancient Rome"
- tapOn:
    id: "custom-category-submit"

# Question screen loads
- extendedWaitUntil:
    visible:
      id: "question-screen"
    timeout: 30000

# Back from question → home
- tapOn:
    id: "question-back"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# Re-enter custom category and use the back button
- tapOn:
    id: "home-category-custom"
- waitForAnimationToEnd
- assertVisible:
    id: "custom-category-input"

- tapOn:
    id: "custom-category-back"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000
