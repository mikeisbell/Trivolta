appId: com.mikeisbell.trivolta
---
# test_24: Back mid-game returns to home; complete a quiz and tap results-home

- clearState
- launchApp:
    clearState: true

# Sign in
- assertVisible:
    id: "auth-email-input"
- tapOn:
    id: "auth-email-input"
- inputText: "testuser_maestro_02@trivolta-test.com"
- tapOn:
    id: "auth-password-input"
- inputText: "TestPassword123!"
- tapOn:
    id: "auth-submit-button"
- tapOn:
    text: "Not Now"
    optional: true
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

# Start a Science quiz, answer Q1, then tap back mid-game
- tapOn:
    id: "home-category-science"
- extendedWaitUntil:
    visible:
      id: "question-screen"
    timeout: 30000
- tapOn:
    id: "answer-0"
- extendedWaitUntil:
    visible:
      id: "question-next"
    timeout: 5000

# Back mid-game → home (game abandoned, no crash)
- tapOn:
    id: "question-back"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# Start a new quiz and complete all 10 questions
- tapOn:
    id: "home-category-science"

