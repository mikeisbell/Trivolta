appId: com.mikeisbell.trivolta
env:
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
---
# test_04: Sign out from ProfileScreen returns to auth screen

- clearState
- launchApp:
    clearState: true

- runScript:
    file: ./scripts/ensure_test_user_02.js
    env:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

# Sign in first
- assertVisible:
    id: "auth-email-input"

- tapOn:
    id: "auth-email-input"
- inputText: "testuser_maestro_02@trivolta-test.com"

- tapOn:
    id: "auth-password-input"
- inputText: "TestPassword123!"

- tapOn:
    id: "auth-submit-button"

# Dismiss iOS "Save Password?" system dialog if it appears
- tapOn:
    text: "Not Now"
    optional: true

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

# Navigate to Profile via avatar button
- tapOn:
    id: "home-avatar"

# Tap sign out button
- tapOn:
    id: "profile-signout-button"

# Confirm the alert
- tapOn: "Confirm"

# Should be back at auth screen
- extendedWaitUntil:
    visible:
      id: "auth-submit-button"
    timeout: 15000
