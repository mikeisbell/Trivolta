appId: com.mikeisbell.trivolta
---
# test_02: Sign up with fresh credentials navigates to HomeScreen
# Deletes testuser_maestro_02@trivolta-test.com before each run so signup always succeeds

- clearState
- launchApp:
    clearState: true

# Delete the test user from Supabase so this test is idempotent
- runScript:
    file: ./scripts/delete_test_user.js
    env:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
- waitForAnimationToEnd

# Switch to sign up mode
- tapOn:
    id: "auth-mode-toggle"

# Fill in username
- tapOn:
    id: "auth-username-input"
- inputText: "maestro02"

# Fill in email
- tapOn:
    id: "auth-email-input"
- inputText: "testuser_maestro_02@trivolta-test.com"

# Fill in password
- tapOn:
    id: "auth-password-input"
- inputText: "TestPassword123!"

# Submit
- tapOn:
    id: "auth-submit-button"

# Dismiss iOS "Save Password?" system dialog if it appears
- tapOn:
    text: "Not Now"
    optional: true

# Should land on HomeScreen
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000
