appId: com.mikeisbell.trivolta
---
# test_06: Profile screen loads with real data

- clearState
- launchApp:
    clearState: true

# Sign in
- assertVisible:
    id: "auth-email-input"
- tapOn:
    id: "auth-email-input"
- inputText: "testuser_maestro_02@trivolta-test.com"
- tapOn:
    id: "auth-password-input"
- inputText: "TestPassword123!"
- tapOn:
    id: "auth-submit-button"
- tapOn:
    text: "Not Now"
    optional: true
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

# Navigate to Profile via avatar button
# Note: tab bar taps do not propagate in Maestro's Expo dev client environment.
# home-avatar uses router.navigate directly and is the reliable navigation path.
- tapOn:
    id: "home-avatar"

# Profile screen should load
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 10000

# Sign out button should be visible
- assertVisible:
    id: "profile-signout-button"
