appId: com.mikeisbell.trivolta
---
# test_23: Leaderboard period tab switching — alltime/week/month

- clearState
- launchApp:
    clearState: true

# Sign in
- assertVisible:
    id: "auth-email-input"
- tapOn:
    id: "auth-email-input"
- inputText: "testuser_maestro_02@trivolta-test.com"
- tapOn:
    id: "auth-password-input"
- inputText: "TestPassword123!"
- tapOn:
    id: "auth-submit-button"
- tapOn:
    text: "Not Now"
    optional: true
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

# Navigate to leaderboard via avatar → profile-back → tab-ranks (test_07 pattern)
- tapOn:
    id: "home-avatar"
- tapOn:
    id: "profile-back"
    optional: true
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 5000
- tapOn:
    id: "tab-ranks"
    optional: true
- extendedWaitUntil:
    visible:
      id: "leaderboard-screen"
    timeout: 10000

# Default tab visible
- assertVisible:
    id: "leaderboard-tab-alltime"

# Switch to week
- tapOn:
    id: "leaderboard-tab-week"
- waitForAnimationToEnd
- assertVisible:
    id: "leaderboard-screen"

# Switch to month
- tapOn:
    id: "leaderboard-tab-month"
- waitForAnimationToEnd
- assertVisible:
    id: "leaderboard-screen"

# Back to all-time
- tapOn:
    id: "leaderboard-tab-alltime"
- waitForAnimationToEnd
- assertVisible:
    id: "leaderboard-screen"
