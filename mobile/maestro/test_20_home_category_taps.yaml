appId: com.mikeisbell.trivolta
env:
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
---
# test_20: HomeScreen category cards — Science, Pop culture, History each open the question screen

- clearState
- launchApp:
    clearState: true

- runScript:
    file: ./scripts/ensure_test_user_02.js
    env:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

# Sign in
- assertVisible:
    id: "auth-email-input"
- tapOn:
    id: "auth-email-input"
- inputText: "testuser_maestro_02@trivolta-test.com"
- tapOn:
    id: "auth-password-input"
- inputText: "TestPassword123!"
- tapOn:
    id: "auth-submit-button"
- tapOn:
    text: "Not Now"
    optional: true
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

# Science → question screen → back to home
- tapOn:
    id: "home-category-science"
- extendedWaitUntil:
    visible:
      id: "question-screen"
    timeout: 30000
- tapOn:
    id: "question-back"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# Pop culture → question screen → back to home
- tapOn:
    id: "home-category-pop_culture"
- extendedWaitUntil:
    visible:
      id: "question-screen"
    timeout: 30000
- tapOn:
    id: "question-back"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# History → question screen → back to home
- tapOn:
    id: "home-category-history"
- extendedWaitUntil:
    visible:
      id: "question-screen"
    timeout: 30000
- tapOn:
    id: "question-back"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000
