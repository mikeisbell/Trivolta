# test_26: LobbyResultsScreen navigation — verify lobby-results-home and lobby-results-play-again
# Runs the seeded full-game flow twice (room code LBRS), verifying each results action.

- clearState
- launchApp:
    clearState: true

# Dismiss any stale "Open in mobile?" dialog from a previous failed run
- tapOn:
    text: "Open"
    optional: true

# Ensure guest user03 exists
- runScript:
